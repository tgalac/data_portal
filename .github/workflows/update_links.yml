name: Scheduled HNB Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual runs via the Actions tab

env:
  # Explicitly forces GitHub Actions to utilize Node 24 to clear warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission to allow saving data.json

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run script
      run: python scrape.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add data.json
        
        # Safe explicit conditional block to replace the risky || shorthand
        if [ -n "$(git status --porcelain)" ]; then
          echo "Changes detected. Committing updates..."
          git commit -m "Automated update of HNB data"
          git push
        else
          echo "No new statistical data found. Skipping commit."
        fi
