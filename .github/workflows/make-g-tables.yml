name: Make HNB G tables workbook

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install LibreOffice, UNO bridge and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreoffice \
            libreoffice-calc \
            python3-uno \
            python3-requests \
            python3-bs4

      - name: Build workbook
        run: |
          /usr/bin/python3 download_g_tables.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v6
        with:
          name: G tablice
          path: G tablice.xlsx
