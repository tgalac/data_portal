name: Make HNB G tables workbook

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install LibreOffice, UNO bridge and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreoffice \
            libreoffice-calc \
            python3-uno \
            python3-requests \
            python3-bs4

      - name: Build workbook
        run: |
          /usr/bin/python3 download_g_tables.py

      - name: Commit generated workbook
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "G tablice.xlsx"
          git commit -m "Update generated G tables workbook" || echo "No changes to commit"
          git push
