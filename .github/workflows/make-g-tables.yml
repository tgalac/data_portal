name: Make HNB G tables workbook

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install LibreOffice and UNO bridge
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice libreoffice-calc python3-uno

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build workbook
        run: |
          python download_g_tables.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v6
        with:
          name: G tablice
          path: G tablice.xlsx
